name: Build and publish container

# Builds the app image and pushes it to GitHub Container Registry (GHCR) so any
# host (Hugging Face Spaces, Cloud Run, Railway, Render.com) can pull a prebuilt
# image instead of building from source.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      engine_extras:
        description: 'Comma-separated engine groups (e.g. "dft,md,materials")'
        required: false
        default: ""
      install_julia:
        description: 'Install Julia + FreeBird.jl (true/false)'
        required: false
        default: "false"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ENGINE_EXTRAS=${{ github.event.inputs.engine_extras }}
            INSTALL_JULIA=${{ github.event.inputs.install_julia }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
